<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ThekaBook — every site's P&amp;L, in your pocket. A KARYA build.">
  <title>ThekaBook — every site's P&amp;L, in your pocket</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12161C"/>
      <stop offset="1" stop-color="#0B0E13"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Ruled ledger lines -->
  <g stroke="#F6F4EE" stroke-opacity="0.06" stroke-width="1">
    <line x1="90" y1="150" x2="1110" y2="150"/>
    <line x1="90" y1="230" x2="1110" y2="230"/>
    <line x1="90" y1="310" x2="1110" y2="310"/>
    <line x1="90" y1="390" x2="1110" y2="390"/>
    <line x1="90" y1="470" x2="1110" y2="470"/>
  </g>
  <!-- Accent margin rule -->
  <line x1="150" y1="90" x2="150" y2="540" stroke="#2563EB" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Brand row -->
  <g transform="translate(90,72)">
    <rect x="0" y="0" width="52" height="46" rx="6" fill="#2563EB"/>
    <rect x="7" y="0" width="5" height="46" fill="#ffffff" opacity="0.35"/>
    <path d="M22 14h20M22 23h20M22 32h13" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <text x="70" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#F6F4EE" letter-spacing="0.5">ThekaBook</text>
  </g>

  <!-- Eyebrow -->
  <text x="180" y="262" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#9DBBFB" letter-spacing="3">FOR CIVIL &amp; INTERIOR CONTRACTORS</text>

  <!-- Headline -->
  <text x="180" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="800" fill="#F6F4EE" letter-spacing="-1.5">Every site's <tspan fill="#2563EB">P&amp;L</tspan>,</text>
  <text x="180" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="800" fill="#F6F4EE" letter-spacing="-1.5">in your pocket.</text>

  <!-- Sub-tagline -->
  <text x="180" y="492" font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#AEB6C1">Labour attendance, material &amp; advances vs your quoted budget — live.</text>

  <!-- KARYA wordmark footer -->
  <text x="90" y="588" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#6E7683">A <tspan fill="#F6F4EE" font-weight="700" letter-spacing="2">KARYA</tspan> studio build</text>
  <text x="1110" y="588" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#9DBBFB">Contractor site expense app · India</text>
</svg>
